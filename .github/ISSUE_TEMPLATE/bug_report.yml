name: 버그 리포트
description: 동작 오류·예상과 다른 결과를 신고합니다
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        보안 취약점은 여기 적지 마세요 — [SECURITY.md](../../SECURITY.md)의 비공개 보고 경로를 이용하세요.
  - type: textarea
    id: what
    attributes:
      label: 무슨 일이 있었나요
      description: 증상과 예상 동작을 함께 적어주세요.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 단계
      description: 실행한 명령(예 `adde up <proj>`)과 순서를 적어주세요.
      placeholder: |
        1. adde lane add ...
        2. adde up ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 환경
      description: OS, Node 버전, ADDE 버전(`adde --version`), source(telegram/markdown).
      placeholder: |
        - OS: macOS 14
        - Node: 22.x
        - adde: 0.1.0
        - source: telegram
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 진단 출력 (선택)
      description: "`adde doctor <proj>` / `adde status <proj>` 출력. 토큰 등 시크릿은 가려주세요."
    validations:
      required: false
