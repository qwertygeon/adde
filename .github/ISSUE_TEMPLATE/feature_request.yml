name: 기능 제안
description: 새 기능·개선을 제안합니다
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편·한계를 겪고 있나요? 배경을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 방안
      description: 원하는 동작·인터페이스(명령·옵션 등)를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 (선택)
      description: 고려한 다른 방법이 있다면 적어주세요.
    validations:
      required: false
