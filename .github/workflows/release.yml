name: Release

# main 에 package.json 변경이 push 되면 게이트 재실행 후 v{version} 태그·GitHub Release·npm 발행.
# 버전 SoT 는 package.json.version 단일. 버전이 안 바뀐 package.json 변경은 태그·발행 멱등 가드가 no-op 처리.
# 서버측 자동화(github.token / NPM_TOKEN). 로컬 git/gh 변경은 사용자 확인과 별개 경로.
on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24 # OIDC Trusted Publishing 하한(npm ≥ 11.5.1 · Node ≥ 22.14) 충족
          cache: pnpm
          registry-url: https://registry.npmjs.org # ~/.npmrc 에 NODE_AUTH_TOKEN 참조 기록(npm publish 인증)

      - run: pnpm install --frozen-lockfile

      - name: Re-run gates
        run: |
          pnpm run typecheck
          pnpm run lint
          pnpm test

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping release."
            exit 0
          fi
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[?" v "\\]?" {f=1; next}
            f && /^## / {exit}
            f {print}
          ' CHANGELOG.md)
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --notes "${NOTES:-Release $TAG}"

      # npm 발행 — prepack(pnpm run build)이 dist/ 를 생성한 뒤 발행한다.
      # 인증: GitHub Secret NPM_TOKEN(Granular Access Token, 2FA bypass). 최초 발행 부트스트랩용.
      # (장기적으로는 OIDC Trusted Publishing 로 전환 — 토큰 없이 provenance 자동. 최초 발행 후 npmjs 에 신뢰발행자 등록.)
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if npm view "adde@${VERSION}" version >/dev/null 2>&1; then
            echo "adde@${VERSION} already published; skipping."
            exit 0
          fi
          npm publish
