name: Release

# main 에 VERSION 변경이 push 되면 게이트 재실행 후 v{VERSION} 태그·GitHub Release 발행.
# 서버측 자동화(github.token). 로컬 git/gh 변경은 사용자 확인(A-P004)과 별개 경로.
# 근거: docs/_internal/RELEASING.md, design/08 §5, 루트 CLAUDE.md "릴리스·CI 자동화 경계".
on:
  push:
    branches: [main]
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24 # OIDC Trusted Publishing 하한(npm ≥ 11.5.1 · Node ≥ 22.14) 충족
          cache: pnpm
          registry-url: https://registry.npmjs.org # ~/.npmrc 에 NODE_AUTH_TOKEN 참조 기록(npm publish 인증)

      - run: pnpm install --frozen-lockfile

      - name: Re-run gates
        run: |
          pnpm run typecheck
          pnpm run lint
          pnpm test

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # 발행은 package.json.version 을 쓰고 태그·멱등 가드는 VERSION 을 쓴다.
      # 둘이 어긋나면 엉뚱한 버전 발행·가드 오작동이 나므로 태그/발행 전에 fail-fast.
      - name: Assert VERSION == package.json.version
        run: |
          FILE_VER="${{ steps.ver.outputs.version }}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$FILE_VER" != "$PKG_VER" ]; then
            echo "::error::VERSION ($FILE_VER) != package.json.version ($PKG_VER) — 두 값을 일치시키세요."
            exit 1
          fi

      - name: Tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping release."
            exit 0
          fi
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[?" v "\\]?" {f=1; next}
            f && /^## / {exit}
            f {print}
          ' CHANGELOG.md)
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --notes "${NOTES:-Release $TAG}"

      # npm 발행 — prepack(pnpm run build)이 dist/ 를 생성한 뒤 발행한다.
      # 인증: GitHub Secret NPM_TOKEN(Granular Access Token, 2FA bypass). 최초 발행 부트스트랩용.
      # (장기적으로는 OIDC Trusted Publishing 로 전환 — 토큰 없이 provenance 자동. 최초 발행 후 npmjs 에 신뢰발행자 등록.)
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if npm view "adde@${VERSION}" version >/dev/null 2>&1; then
            echo "adde@${VERSION} already published; skipping."
            exit 0
          fi
          npm publish
